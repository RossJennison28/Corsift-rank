services:
  convex:
    build:
      context: .
      target: convex
    env_file:
      - backend/.env.local
    ports:
      - "3210:3210"
      - "3211:3211"

  scraper-api:
    build:
      context: .
      target: scraper-api
    ports:
      - "8001:8001"

  frontend:
    build:
      context: .
      target: frontend
    depends_on:
      - scraper-api
      - convex
    environment:
      VITE_API_PROXY_TARGET: ${VITE_API_PROXY_TARGET:-http://scraper-api:8001}
      VITE_CONVEX_URL: ${VITE_CONVEX_URL:-http://localhost:3210}
    ports:
      - "5173:5173"
